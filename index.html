<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="icon" href="/favicon.ico" />
    <title>%VITE_APP_TITLE%</title>
    <!--[if lt IE 11
      ]><script>
        window.location.href = '/html/ie.html';
      </script><!
    [endif]-->
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0px;
        padding: 0px;
      }

      .chromeframe {
        margin: 0.2em 0;
        background: #ccc;
        color: #000;
        padding: 0.2em 0;
      }

      /* ===== 加载遮罩层：独立于 #app，避免 Vue mount 时被直接移除 ===== */
      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0d1f3c;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #loader-wrapper.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* ===== CallNexus 文字动画 ===== */
      .loader-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: rgba(255, 255, 255, 0.6);
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 3px;
        margin-bottom: 12px;
        opacity: 0;
        transform: translateY(8px);
        animation: titleIn 0.8s 0.2s ease forwards;
      }

      @keyframes titleIn {
        to { opacity: 1; transform: translateY(0); }
      }

      /* ===== 分阶段状态提示：图标 + 文案 ===== */
      .loader-status {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 24px;
        margin-bottom: 40px;
      }

      .loader-status-icon {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(64, 158, 255, 0.3);
        border-top-color: #409eff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loader-status-icon.done {
        border: none;
        background: #409eff;
        animation: none;
        /* ✓ 对勾：用伪元素绘制 */
        position: relative;
      }
      .loader-status-icon.done::before,
      .loader-status-icon.done::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 2px;
        width: 3px;
        height: 7px;
        background: #fff;
        border-radius: 1px;
      }
      .loader-status-icon.done::before {
        transform: rotate(45deg);
      }
      .loader-status-icon.done::after {
        top: 6px;
        left: 5px;
        height: 4px;
        transform: rotate(-45deg);
      }

      .loader-status-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: rgba(255, 255, 255, 0.55);
        font-size: 14px;
        letter-spacing: 1px;
      }

      /* 进度条 */
      .loader-progress {
        width: 280px;
        height: 3px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }

      .loader-progress-bar {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, transparent, #409eff, #79bbff, transparent);
        border-radius: 3px;
        animation: progress 2s ease-in-out infinite;
      }

      /* 进度条：加载完成后填满 */
      #loader-wrapper.fade-out .loader-progress-bar {
        width: 100%;
        background: #409eff;
        animation: none;
        transition: width 0.6s ease;
      }

      @keyframes progress {
        0% { transform: translateX(-150%); }
        100% { transform: translateX(350%); }
      }

      /* 状态文案切换动画 */
      .loader-status-text {
        transition: opacity 0.3s ease;
      }
      .loader-status-text.switching {
        opacity: 0;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <!-- 加载遮罩：放在 #app 外部，Vue mount 不会移除它 -->
    <div id="loader-wrapper">
      <div class="loader-title">CallNexus</div>
      <div class="loader-status">
        <div id="loader-status-icon" class="loader-status-icon"></div>
        <span id="loader-status-text" class="loader-status-text">正在加载应用资源…</span>
      </div>
      <div class="loader-progress">
        <div class="loader-progress-bar"></div>
      </div>
    </div>

    <!-- 分阶段状态管理：可在 Vue 应用启动各阶段调用 window.__setLoaderStatus(text) 更新文案 -->
    <script>
      (function () {
        let loaded = false;
        const stages = [];
        let currentStage = -1;
        const textEl = document.getElementById('loader-status-text');
        const iconEl = document.getElementById('loader-status-icon');

        /** 更新加载状态文案 */
        window.__setLoaderStatus = function (text, done) {
          if (!textEl || !iconEl || loaded) return;
          if (text) {
            textEl.classList.add('switching');
            setTimeout(function () {
              if (textEl) textEl.textContent = text;
              textEl && textEl.classList.remove('switching');
            }, 150);
          }
          if (done) {
            iconEl.classList.add('done');
          }
          currentStage++;
          stages.push({ iconEl: iconEl, done: !!done });
        };

        /** 应用加载完成：标记状态完成 → 文案切换 → 淡出遮罩层 → 移除 DOM */
        window.__appLoaded = function () {
          if (loaded) return;
          loaded = true;
          if (!iconEl) return;
          iconEl.classList.add('done');
          if (textEl) {
            textEl.classList.add('switching');
            setTimeout(function () {
              textEl.textContent = '加载完成，即将进入系统';
              textEl.classList.remove('switching');
            }, 150);
          }
          setTimeout(function () {
            var wrapper = document.getElementById('loader-wrapper');
            if (wrapper) {
              wrapper.classList.add('fade-out');
              wrapper.addEventListener('transitionend', function (e) {
                if (e.target === wrapper) wrapper.remove();
              });
              setTimeout(function () { wrapper.remove(); }, 5000);
            }
          }, 600);
        };
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
